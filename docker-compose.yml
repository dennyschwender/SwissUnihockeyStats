services:
  # SwissUnihockey FastAPI Backend
  swissunihockey:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swissunihockey-api
    image: swissunihockey:latest
    
    # Environment variables for FastAPI backend
    environment:
      # API Configuration
      - API_V1_PREFIX=/api/v1
      - PROJECT_NAME=SwissUnihockey API
      - VERSION=1.0.0
      - DEBUG=false
      # SwissUnihockey API Integration
      - SWISSUNIHOCKEY_API_URL=https://api-v2.swissunihockey.ch
      - SWISSUNIHOCKEY_LOCALE=de-CH
      - SWISSUNIHOCKEY_CACHE_ENABLED=true
      - SWISSUNIHOCKEY_CACHE_DIR=/app/data/cache
      # Server
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=1
      # Timezone
      - TZ=Europe/Zurich
    
    # Volume mounts for persistent cache
    volumes:
      - ./data/cache:/app/data/cache
      - ./scripts:/app/scripts:ro
    
    # Expose port for FastAPI
    ports:
      - "8000:8000"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Restart policy
    restart: unless-stopped
    
    # Network
    networks:
      - swissunihockey-net

  # Cache preloader (run once to populate cache)
  # NOTE: This service uses the old API client structure and needs updating
  # preload-cache:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: swissunihockey-preload
  #   image: swissunihockey:latest
  #   
  #   environment:
  #     - SWISSUNIHOCKEY_API_URL=https://api-v2.swissunihockey.ch
  #     - SWISSUNIHOCKEY_LOCALE=de-CH
  #     - TZ=Europe/Zurich
  #   
  #   volumes:
  #     - ./data/cache:/app/data/cache
  #   
  #   command: ["python", "scripts/preload_cache.py"]
  #   
  #   networks:
  #     - swissunihockey-net
  #   
  #   restart: "no"
  #   profiles:
  #     - preload

  # Example: Scheduled cache refresh with cron
  # NOTE: This service uses the old API client structure and needs updating
  # cache-refresher:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: swissunihockey-refresher
  #   image: swissunihockey:latest
  #   
  #   environment:
  #     - SWISSUNIHOCKEY_API_URL=https://api-v2.swissunihockey.ch
  #     - SWISSUNIHOCKEY_LOCALE=de-CH
  #     - TZ=Europe/Zurich
