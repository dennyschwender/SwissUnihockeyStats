version: '3.8'

services:
  # SwissUnihockey API Client
  swissunihockey:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swissunihockey-client
    image: swissunihockey:latest
    
    # Environment variables
    environment:
      - SWISSUNIHOCKEY_API_URL=https://api-v2.swissunihockey.ch
      - SWISSUNIHOCKEY_LOCALE=de-CH
      - SWISSUNIHOCKEY_CACHE_ENABLED=true
      - SWISSUNIHOCKEY_CACHE_DIR=/app/data/cache
      - TZ=Europe/Zurich
    
    # Volume mounts for persistent cache
    volumes:
      - ./data/cache:/app/data/cache
      - ./scripts:/app/scripts:ro
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Restart policy
    restart: unless-stopped
    
    # Network
    networks:
      - swissunihockey-net

  # Cache preloader (run once to populate cache)
  preload-cache:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swissunihockey-preload
    image: swissunihockey:latest
    
    environment:
      - SWISSUNIHOCKEY_API_URL=https://api-v2.swissunihockey.ch
      - SWISSUNIHOCKEY_LOCALE=de-CH
      - TZ=Europe/Zurich
    
    volumes:
      - ./data/cache:/app/data/cache
    
    command: ["python", "scripts/preload_cache.py"]
    
    networks:
      - swissunihockey-net
    
    # Run once and exit
    restart: "no"
    
    # Only run when explicitly started
    profiles:
      - preload

  # Example: Scheduled cache refresh with cron
  cache-refresher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swissunihockey-refresher
    image: swissunihockey:latest
    
    environment:
      - SWISSUNIHOCKEY_API_URL=https://api-v2.swissunihockey.ch
      - SWISSUNIHOCKEY_LOCALE=de-CH
      - TZ=Europe/Zurich
    
    volumes:
      - ./data/cache:/app/data/cache
      - ./scripts:/app/scripts:ro
    
    # Run preload script every hour
    entrypoint: /bin/sh -c
    command: >
      "while true; do
        python scripts/preload_cache.py;
        echo 'Cache refreshed at $(date)';
        sleep 3600;
      done"
    
    restart: unless-stopped
    
    networks:
      - swissunihockey-net
    
    # Optional: only run when explicitly enabled
    profiles:
      - auto-refresh

networks:
  swissunihockey-net:
    driver: bridge

volumes:
  cache-data:
    driver: local
