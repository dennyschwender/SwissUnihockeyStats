services:
  # SwissUnihockey FastAPI Backend
  swissunihockey:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swissunihockey-api
    image: swissunihockey:latest
    
    # Environment variables (minimal overrides - main config in backend/.env)
    environment:
      # Docker-specific overrides
      - HOST=0.0.0.0
      - PORT=8000
      - TZ=Europe/Zurich
      # Data paths in container (override config.py __file__-based resolution)
      - DATA_DIR=/app/data
      - DATABASE_PATH=/app/data/swissunihockey.db
      - SWISSUNIHOCKEY_CACHE_DIR=/app/data/cache
    
    # Volume mounts for persistent cache and config
    volumes:
      - ./data:/app/data
      - ./backend/.env:/app/.env:ro
      - ./scripts:/app/scripts:ro
    
    # Expose port for FastAPI
    ports:
      - "8000:8000"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Healthcheck (override Dockerfile default to avoid IPv6-first delay)
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

    # Restart policy
    restart: unless-stopped
    
    # Network
    networks:
      - swissunihockey-net

  # Cache preloader (run once to populate cache)
