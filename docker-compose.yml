services:
  swissunihockey:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swissunihockeystats

    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=1
      - DEBUG=false
      - TZ=Europe/Zurich
      - DATABASE_PATH=/app/data/swissunihockey.db
      - SWISSUNIHOCKEY_CACHE_DIR=/app/data/cache
      - DATA_DIR=/app/data

    volumes:
      - ./data:/app/data
      - ./backend/.env:/app/.env:ro

    ports:
      - "8000:8000"

    # Single gunicorn/uvicorn worker — SQLite does not support concurrent multi-process writes.
    # Async uvicorn handles all request concurrency within one process via asyncio.
    command: [
      "gunicorn", "app.main:app",
      "--workers", "1",
      "--worker-class", "uvicorn.workers.UvicornWorker",
      "--bind", "0.0.0.0:8000",
      "--timeout", "120",
      "--access-logfile", "-",
      "--error-logfile", "-"
    ]

    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 512M

    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

    restart: unless-stopped

    networks:
      - swissunihockey-net

networks:
  swissunihockey-net:
    driver: bridge
