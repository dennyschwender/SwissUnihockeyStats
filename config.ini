[API]
base_url = https://api-v2.swissunihockey.ch
default_locale = de-CH
timeout = 30

[DATA]
raw_data_dir = data/raw
processed_data_dir = data/processed

[SEASONS]
# Current season (format: YYYY for season YYYY/YY+1)
current_season = 2025
# Historical seasons to analyze
start_season = 2017

[LEAGUES]
# League codes:
# 2 = NLB (National League B)
# 3 = 1. Liga
# 4 = 2. Liga
# 5 = 3. Liga
# etc.
default_league = 2

[GAME_CLASSES]
# 11 = Men/Herren
# 21 = Women/Damen
# 31-36 = Junior categories
default_game_class = 11

[LOGGING]
log_level = INFO
log_file = swissunihockey.log
