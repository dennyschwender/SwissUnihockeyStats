services:
  swissunihockey:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swissunihockey-prod
    image: swissunihockey:latest

    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=4
      - DEBUG=false
      - TZ=Europe/Zurich
      - DATABASE_PATH=/app/data/swissunihockey.db
      - SWISSUNIHOCKEY_CACHE_DIR=/app/data/cache

    volumes:
      - ./data:/app/data
      - ./backend/.env:/app/.env:ro

    ports:
      - "8000:8000"

    restart: unless-stopped

    networks:
      - swissunihockey-net

    # Run with gunicorn + uvicorn workers for production
    command: [
      "gunicorn", "app.main:app",
      "--workers", "4",
      "--worker-class", "uvicorn.workers.UvicornWorker",
      "--bind", "0.0.0.0:8000",
      "--timeout", "120",
      "--access-logfile", "-",
      "--error-logfile", "-"
    ]

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  swissunihockey-net:
    driver: bridge
