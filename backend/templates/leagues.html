{% extends "base.html" %}

{% block title %}{{ t.nav.leagues }} – {{ t.common.app_name }}{% endblock %}

{% block content %}
<script type="application/json" id="leagues-data">{{ leagues_flat | tojson }}</script>
<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('leaguesFilter', () => {
    const leagues = JSON.parse(document.getElementById('leagues-data').textContent);
    const locale = {{ locale | tojson }};
    const T = {
      big_field:    {{ t.leagues.big_field    | tojson }},
      small_field:  {{ t.leagues.small_field  | tojson }},
      gender_men:   {{ t.leagues.gender_men   | tojson }},
      gender_women: {{ t.leagues.gender_women | tojson }},
      gender_mixed: {{ t.leagues.gender_mixed | tojson }},
      gender_other: {{ t.leagues.gender_other | tojson }},
      count_one:    {{ t.leagues.count_one    | tojson }},
      count_many:   {{ t.leagues.count_many   | tojson }},
      filter_senior:   {{ t.leagues.filter_senior   | tojson }},
      filter_senioren: {{ t.leagues.filter_senioren | tojson }},
    };

    const GENDER_LABEL = { men: T.gender_men, women: T.gender_women };
    // Age-group sort order after senior tiers (1–6)
    const AGE_SORT = { U21: 7, U18: 8, U16: 9, U14: 10, U12: 11, U10: 12, Senioren: 13 };
    const SEX_SORT  = { men: 0, women: 1, mixed: 2 };

    function buildTierSections(filtered) {
      const map = {};
      for (const l of filtered) {
        const isSenior = l.gender === 'men' || l.gender === 'women';
        const key   = isSenior ? 'tier_' + l.tier : 'age_' + l.gender;
        const label = isSenior ? l.tier_label     : l.gender;
        const sort  = isSenior ? l.tier            : (AGE_SORT[l.gender] ?? 99);
        if (!map[key]) map[key] = { key, label, sort, subMap: {} };
        // Split every tier by sex (men / women / mixed)
        const sg = l.sex;
        if (!map[key].subMap[sg]) map[key].subMap[sg] = { sex: sg, leagues: [] };
        map[key].subMap[sg].leagues.push(l);
      }
      return Object.values(map)
        .sort((a, b) => a.sort - b.sort)
        .map(s => {
          const subgroups = Object.values(s.subMap)
            .sort((a, b) => (SEX_SORT[a.sex] ?? 99) - (SEX_SORT[b.sex] ?? 99))
            .map(sg => ({ ...sg, leagues: sg.leagues.slice().sort((a, b) => a.name.localeCompare(b.name)) }));
          const leagues = subgroups.length === 1 ? subgroups[0].leagues : [];
          return { key: s.key, label: s.label, sort: s.sort, subgroups, leagues };
        });
    }

    return {
      leagues,
      locale,
      activeSex:   'all',
      activeAge:   'all',
      activeField: 'all',

      get filtered() {
        return this.leagues.filter(l => {
          const isSenior = l.gender === 'men' || l.gender === 'women';
          const sOk = this.activeSex === 'all' || l.sex === this.activeSex;
          const aOk = this.activeAge === 'all'
            || (this.activeAge === 'senior'   ? isSenior
            : (this.activeAge === 'senioren'  ? l.gender === 'Senioren'
            : l.gender === this.activeAge));
          const fOk = this.activeField === 'all' || l.field === this.activeField;
          return sOk && aOk && fOk;
        });
      },

      get tierSections() { return buildTierSections(this.filtered); },

      get filteredCount() { return this.filtered.length; },
      get countLabel() { return this.filteredCount + ' ' + (this.filteredCount === 1 ? T.count_one : T.count_many); },

      // sex label shown in sub-headers
      sexLabel(s) { return s === 'men' ? T.gender_men : s === 'women' ? T.gender_women : T.gender_mixed; },
      fieldLabel(f) { return f === 'big' ? T.big_field : T.small_field; },

    };
  });
});
</script>

<div class="container page-content" x-data="leaguesFilter()">
  <!-- Header row -->
  <div class="page-header">
    <h1 class="page-title">🏆 Leagues</h1>
    {% if seasons %}
    <form method="get" class="filter-form">
      <label for="season-select" class="filter-label">Season</label>
      <select id="season-select" name="season" onchange="this.form.submit()" class="filter-select">
        {% for s in seasons %}
        <option value="{{ s.id }}" {% if s.id == selected_season %}selected{% endif %}>{{ s.name }}</option>
        {% endfor %}
      </select>
    </form>
    {% endif %}
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <!-- Sex filter -->
    <div class="filter-bar-row">
      <span class="filter-bar-label">{{ t.leagues.filter_sex }}</span>
      <button :class="['filter-chip', activeSex==='all' && 'active']"    @click="activeSex='all'">{{ t.leagues.filter_all }}</button>
      <button :class="['filter-chip', activeSex==='men' && 'active']"    @click="activeSex='men'">{{ t.leagues.filter_men }}</button>
      <button :class="['filter-chip', activeSex==='women' && 'active']"  @click="activeSex='women'">{{ t.leagues.filter_women }}</button>
      <button :class="['filter-chip', activeSex==='mixed' && 'active']"  @click="activeSex='mixed'">{{ t.leagues.filter_mixed }}</button>
    </div>
    <!-- Age/category filter -->
    <div class="filter-bar-row">
      <span class="filter-bar-label">{{ t.leagues.filter_age }}</span>
      <button :class="['filter-chip', activeAge==='all' && 'active']"       @click="activeAge='all'">{{ t.leagues.filter_all }}</button>
      <button :class="['filter-chip', activeAge==='senior' && 'active']"    @click="activeAge='senior'">{{ t.leagues.filter_senior }}</button>
      <button :class="['filter-chip', activeAge==='U21' && 'active']"       @click="activeAge='U21'">U21</button>
      <button :class="['filter-chip', activeAge==='U18' && 'active']"       @click="activeAge='U18'">U18</button>
      <button :class="['filter-chip', activeAge==='U16' && 'active']"       @click="activeAge='U16'">U16</button>
      <button :class="['filter-chip', activeAge==='U14' && 'active']"       @click="activeAge='U14'">U14</button>
      <button :class="['filter-chip', activeAge==='U12' && 'active']"       @click="activeAge='U12'">U12</button>
      <button :class="['filter-chip', activeAge==='U10' && 'active']"       @click="activeAge='U10'">U10</button>
      <button :class="['filter-chip', activeAge==='senioren' && 'active']"  @click="activeAge='senioren'">{{ t.leagues.filter_senioren }}</button>
    </div>
    <!-- Field filter -->
    <div class="filter-bar-row">
      <span class="filter-bar-label">{{ t.leagues.filter_field }}</span>
      <button :class="['filter-chip', activeField==='all' && 'active']"   @click="activeField='all'">{{ t.leagues.filter_all }}</button>
      <button :class="['filter-chip', activeField==='big' && 'active']"   @click="activeField='big'">{{ t.leagues.big_field }}</button>
      <button :class="['filter-chip', activeField==='small' && 'active']" @click="activeField='small'">{{ t.leagues.small_field }}</button>
    </div>
    <!-- Count -->
    <div class="filter-bar-count" x-text="countLabel"></div>
  </div>

  <!-- Sections -->
  <template x-if="tierSections.length > 0">
    <div>
      <template x-for="section in tierSections" :key="section.key">
        <div style="margin-bottom:1.75rem;">
          <!-- Tier / age-group heading -->
          <h3 class="section-divider">
            <span class="section-divider-line"></span>
            <span x-text="section.label"></span>
            <span class="section-divider-line"></span>
          </h3>
          <!-- Cards: split into men/women/mixed subgroups when multiple, flat grid when single -->
          <template x-if="section.subgroups.length > 1">
            <div class="sex-group-wrap">
              <template x-for="sg in section.subgroups" :key="sg.sex">
                <div :class="['sex-col', 'sex-col--' + sg.sex]">
                  <div :class="['sex-col-label', 'sex-col-label--' + sg.sex]" x-text="sexLabel(sg.sex)"></div>
                  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.55rem;">
                    <template x-for="league in sg.leagues" :key="league.id">
                      <a :href="`/${locale}/league/${league.id}`" class="link-inherit">
                        <div class="listing-card listing-card--compact">
                          <div class="listing-card-name listing-card-name--sm" x-text="league.name"></div>
                          <div class="listing-card-meta">
                            <span x-show="league.group_count > 1" x-text="league.group_count + ' groups'"></span>
                            <span class="badge-pill badge-pill--neutral" x-text="fieldLabel(league.field)"></span>
                          </div>
                        </div>
                      </a>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <!-- Single sex: flat grid, no sub-header -->
          <template x-if="section.subgroups.length <= 1">
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.65rem;">
              <template x-for="league in section.leagues" :key="league.id">
                <a :href="`/${locale}/league/${league.id}`" class="link-inherit">
                  <div class="listing-card">
                    <div class="listing-card-name" x-text="league.name"></div>
                    <div class="listing-card-meta">
                      <span x-show="league.group_count > 1" x-text="league.group_count + ' groups'"></span>
                      <span :class="['badge-pill', 'badge-pill--' + league.sex]" x-text="sexLabel(league.sex)"></span>
                      <span class="badge-pill badge-pill--neutral" x-text="fieldLabel(league.field)"></span>
                    </div>
                  </div>
                </a>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>

  <!-- Empty state -->
  <template x-if="tierSections.length === 0">
    <div class="empty-state-center">
      <p class="empty-state-icon">🏆</p>
      <p>{{ t.leagues.no_match }}</p>
      <button @click="activeSex='all'; activeAge='all'; activeField='all';"
              class="filter-clear-btn">
        {{ t.leagues.clear_filters }}
      </button>
    </div>
  </template>

</div>
{% endblock %}
