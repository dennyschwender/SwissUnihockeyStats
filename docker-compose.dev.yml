version: '3.8'

# Development Docker Compose configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  swissunihockey:
    # Override for development
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development tools
    
    # Mount source code for live editing
    volumes:
      - ./api:/app/api
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./data/cache:/app/data/cache
      - ./config.ini:/app/config.ini
    
    # Enable debug mode
    environment:
      - PYTHONDONTWRITEBYTECODE=0
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    
    # Development command (with auto-reload)
    command: ["python", "-i"]
    
    # Expose ports for debugging
    ports:
      - "5678:5678"  # Python debugger
    
    # Override resource limits for development
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # Jupyter notebook for data exploration
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swissunihockey-jupyter
    
    volumes:
      - ./:/app
      - ./data/cache:/app/data/cache
    
    environment:
      - JUPYTER_ENABLE_LAB=yes
    
    command: >
      sh -c "pip install jupyter jupyterlab pandas matplotlib seaborn &&
             jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
             --NotebookApp.token='' --NotebookApp.password=''"
    
    ports:
      - "8888:8888"
    
    networks:
      - swissunihockey-net
    
    profiles:
      - dev
      - jupyter

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: swissunihockey-redis
    
    command: redis-server --appendonly yes
    
    volumes:
      - redis-data:/data
    
    ports:
      - "6379:6379"
    
    networks:
      - swissunihockey-net
    
    profiles:
      - dev
      - redis

volumes:
  redis-data:
    driver: local
