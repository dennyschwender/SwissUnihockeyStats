[flake8]
max-line-length = 127
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist,
    *.egg-info,
    data/

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --cov=api
    --cov-report=term-missing
    --cov-report=html

[coverage:run]
source = api
omit = 
    */tests/*
    */__init__.py
    */site-packages/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
